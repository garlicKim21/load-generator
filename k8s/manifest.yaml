apiVersion: v1
kind: Namespace
metadata:
  name: load-tester
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: load-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi
        image: yondulab/load-tester-frontend:v0.4
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: load-tester
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: load-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi 
        image: yondulab/load-tester-backend:v0.4
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: load-tester
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-generator
  namespace: load-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-generator
  template:
    metadata:
      labels:
        app: cpu-generator
    spec:
      containers:
      - name: cpu-generator
        image: yondulab/load-tester-cpu-generator:v0.3
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cpu-generator
  namespace: load-tester
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: cpu-generator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-generator
  namespace: load-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-generator
  template:
    metadata:
      labels:
        app: memory-generator
    spec:
      containers:
      - name: memory-generator
        image: yondulab/load-tester-memory-generator:v0.1
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 1280Mi
---
apiVersion: v1
kind: Service
metadata:
  name: memory-generator
  namespace: load-tester
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: memory-generator
